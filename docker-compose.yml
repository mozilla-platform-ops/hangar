services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: relops
      POSTGRES_USER: relops
      POSTGRES_PASSWORD: relops
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relops"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://relops:relops@db:5432/relops
      STATIC_DIR: /app/frontend/dist
      LOG_JSON: "false"
    volumes:
      - ./backend:/app
      - ./frontend/dist:/app/frontend/dist
      - puppet_repo:/tmp/ronin_puppet
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  puppet_repo:
