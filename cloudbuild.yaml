steps:
  # Build frontend
  - name: "node:20-slim"
    id: build-frontend
    entrypoint: bash
    args:
      - "-c"
      - "cd frontend && npm ci --prefer-offline && npm run build"

  # Build and push Docker image (multi-stage, uses repo root as context)
  - name: "gcr.io/cloud-builders/docker"
    id: build-image
    waitFor: ["build-frontend"]
    args:
      - build
      - --file=backend/Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend:latest
      - .

  - name: "gcr.io/cloud-builders/docker"
    id: push-image
    waitFor: ["build-image"]
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: deploy
    waitFor: ["push-image"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hangar
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend:$COMMIT_SHA
      - --region=$_REGION
      - --quiet

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/hangar/backend:latest
